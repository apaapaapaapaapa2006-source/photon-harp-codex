<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Test</title>
<style>
  html, body { margin:0; min-height:100%; background:#050208; color:#e8f9ff; font-family:system-ui, sans-serif; }
  main { min-height:100vh; display:grid; place-items:center; gap:1rem; padding:1rem; box-sizing:border-box; }
  video { width:min(92vw, 720px); max-height:60vh; background:#111; border:1px solid rgba(0,240,255,.4); transform:scaleX(-1); }
  button { padding:.9rem 1.5rem; background:#050208; color:#00f0ff; border:1px solid #00f0ff; font:inherit; }
  pre { width:min(92vw, 720px); white-space:pre-wrap; color:#9ff; background:rgba(255,255,255,.06); padding:1rem; box-sizing:border-box; }
</style>
</head>
<body>
<main>
  <h1>Camera Test</h1>
  <video id="video" autoplay playsinline muted></video>
  <button id="start">START CAMERA</button>
  <pre id="status">waiting</pre>
</main>
<script>
const video = document.getElementById('video');
const status = document.getElementById('status');
const start = document.getElementById('start');
function log(text){ status.textContent = text; }
start.addEventListener('click', async () => {
  try{
    log(`protocol: ${location.protocol}\nrequesting camera...`);
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      throw new Error('navigator.mediaDevices.getUserMedia is not available');
    }
    const stream = await navigator.mediaDevices.getUserMedia({ audio:false, video:{ facingMode:'user' } });
    video.srcObject = stream;
    video.muted = true;
    video.playsInline = true;
    await video.play();
    setInterval(() => {
      const tracks = stream.getVideoTracks().map(t => `${t.label || 'camera'} / ${t.readyState} / enabled:${t.enabled}`).join('\n');
      log(`OK\nprotocol: ${location.protocol}\nvideo: ${video.videoWidth}x${video.videoHeight}\ntracks:\n${tracks}`);
    }, 500);
  } catch (err){
    log(`FAILED\n${err.name || 'Error'}: ${err.message || err}\n\nChrome settings: Site settings > Camera > Allow`);
  }
});
</script>
</body>
</html>
