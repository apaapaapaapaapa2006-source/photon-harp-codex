<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#050208">
<title>Camera Test</title>
<style>
  *{ box-sizing:border-box; }
  html,body{
    margin:0; min-height:100%; background:#050208; color:#e8f9ff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  main{
    min-height:100vh; display:grid; place-items:center; padding:24px;
  }
  .panel{
    width:min(680px,100%); display:grid; gap:16px;
  }
  h1{ margin:0; font-size:28px; letter-spacing:0.03em; }
  p{ margin:0; color:rgba(232,249,255,0.72); line-height:1.7; }
  video{
    width:100%; aspect-ratio:16/9; background:#111; border:1px solid rgba(232,249,255,0.16);
    object-fit:cover; transform:scaleX(-1);
  }
  button{
    width:fit-content; padding:12px 20px; border:1px solid #00f0ff; background:transparent;
    color:#00f0ff; border-radius:4px; font:inherit; cursor:pointer;
  }
  button:disabled{ opacity:0.5; cursor:wait; }
  pre{
    margin:0; min-height:96px; padding:12px; border:1px solid rgba(232,249,255,0.14);
    background:rgba(255,255,255,0.04); color:rgba(232,249,255,0.82); white-space:pre-wrap;
    font:13px/1.55 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
</style>
</head>
<body>
<main>
  <section class="panel">
    <h1>Camera Test</h1>
    <p>カメラ権限と映像入力だけを確認するページです。ここで映れば、ブラウザとOSのカメラ許可は通っています。</p>
    <video id="video" autoplay playsinline muted></video>
    <button id="start" type="button">START CAMERA</button>
    <pre id="log">WAITING</pre>
  </section>
</main>
<script>
(() => {
  const video = document.getElementById('video');
  const start = document.getElementById('start');
  const log = document.getElementById('log');

  function write(message){
    log.textContent = message;
  }

  start.addEventListener('click', async () => {
    start.disabled = true;
    write('REQUESTING CAMERA...');
    try{
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        throw new Error('getUserMedia is not available in this browser.');
      }
      const stream = await navigator.mediaDevices.getUserMedia({
        audio:false,
        video:{ facingMode:'user', width:{ ideal:1280 }, height:{ ideal:720 } }
      });
      video.srcObject = stream;
      await video.play();
      write([
        'CAMERA: PLAYING',
        `URL: ${location.href}`,
        `VIDEO: ${video.videoWidth || 0}x${video.videoHeight || 0}`,
        `TRACKS: ${stream.getVideoTracks().map((track) => track.label || 'camera').join(', ')}`
      ].join('\n'));
    } catch (err){
      write(`CAMERA: FAILED\n${err.name || 'Error'}: ${err.message || err}`);
      start.disabled = false;
    }
  });
})();
</script>
</body>
</html>
