<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>in_between ... v2</title>
<style>html,body{height:100%;margin:0;background:#050505;color:#e8e8e6;font-family:ui-monospace,Menlo,Consolas,monospace}body{display:grid;place-items:center;text-align:center;padding:24px}</style>
</head>
<body>
<main id="loading">in_between ... v2 loading ...</main>
<script>
'use strict';
const payloadFiles = Array.from({ length: 8 }, (_, i) => `in_between_part_${i}.txt`);
async function boot() {
  try {
    if (!('DecompressionStream' in window)) throw new Error('DecompressionStream is not available in this browser');
    const parts = await Promise.all(payloadFiles.map(async path => {
      const response = await fetch(path + '?v=20260714-4', { cache: 'no-store' });
      if (!response.ok) throw new Error(path + ' ' + response.status);
      return response.text();
    }));
    const payload = parts.join('').trim();
    const bytes = Uint8Array.from(atob(payload), c => c.charCodeAt(0));
    const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
    const html = await new Response(stream).text();
    document.open();
    document.write(html);
    document.close();
  } catch (error) {
    document.getElementById('loading').innerHTML = '<p>このブラウザでは作品を展開できませんでした。</p><p>ChromeまたはSafariの最新版で開いてください。</p><p>' + String(error.message || error) + '</p>';
  }
}
boot();
</script>
</body>
</html>
