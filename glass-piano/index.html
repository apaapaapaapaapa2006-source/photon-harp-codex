<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>glass piano tiles</title>
<link rel="canonical" href="https://apaapaapaapaapa2006-source.github.io/photon-harp-codex/glass-piano/">
<meta property="og:url" content="https://apaapaapaapaapa2006-source.github.io/photon-harp-codex/glass-piano/">
<meta property="og:title" content="glass piano tiles">
<meta property="og:type" content="website">
<style>
:root{--bg:#050507;--ink:#f5f3ee;--dim:#777780;--gold:#d9c4a3;--cyan:#7fd4d4}
*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--ink);font-family:Georgia,'Times New Roman',serif;-webkit-tap-highlight-color:transparent}body:before{content:"";position:fixed;inset:0;z-index:30;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,.018) 1px,transparent 1px),radial-gradient(rgba(255,255,255,.012) 1px,transparent 1px);background-size:3px 3px,7px 7px;background-position:0 0,1px 1px;mix-blend-mode:overlay}#stage{position:fixed;inset:0;display:grid;place-items:center}video,canvas{position:absolute;width:100%;height:100%;object-fit:cover}video{opacity:0;filter:saturate(.95) contrast(1.04) brightness(.96)}.mirror{transform:scaleX(-1)}#fx{pointer-events:none}.grade{position:fixed;inset:0;z-index:3;pointer-events:none;background:radial-gradient(ellipse 120% 90% at 50% 45%,transparent 52%,rgba(0,0,5,.58) 100%),linear-gradient(to bottom,rgba(30,20,60,.08),transparent 35%,rgba(60,30,10,.09))}.hud{position:fixed;z-index:10;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase}.tl{top:18px;left:20px}.tr{top:18px;right:20px;text-align:right}.bl{bottom:22px;left:20px}.br{bottom:22px;right:20px;text-align:right}.title{font-family:Georgia,'Times New Roman',serif;font-style:italic;font-size:22px;letter-spacing:0;text-transform:none;color:var(--ink);line-height:1}.sub{display:block;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-style:normal;font-size:9px;letter-spacing:.3em;color:var(--dim);margin-top:6px;text-transform:uppercase}.row{display:flex;gap:10px;align-items:baseline;justify-content:flex-end}.val{color:var(--ink);font-variant-numeric:tabular-nums}#gate{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;flex-direction:column;background:radial-gradient(ellipse at center,#0a0a10 0%,#000 80%);cursor:pointer;transition:opacity .8s ease}#gate.gone{opacity:0;pointer-events:none}.mark{width:1px;height:60px;background:linear-gradient(to bottom,transparent,var(--gold),transparent);margin-bottom:36px;animation:pulse 2.4s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:.3;transform:scaleY(.6)}50%{opacity:1;transform:scaleY(1)}}h1{margin:0;font-style:italic;font-weight:300;font-size:clamp(40px,9vw,72px);line-height:.95;text-align:center}.em{color:var(--gold)}.tagline{margin-top:28px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;letter-spacing:.4em;color:var(--dim);text-transform:uppercase}.cta{margin-top:60px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;letter-spacing:.3em;text-transform:uppercase;padding:14px 28px;border:1px solid rgba(255,255,255,.2);border-radius:999px}#panel{position:fixed;left:0;right:0;bottom:0;z-index:20;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:18px 20px 70px;background:linear-gradient(to top,rgba(0,0,0,.85),rgba(0,0,0,.38) 70%,transparent);transition:transform .45s cubic-bezier(.2,.8,.2,1)}#panel.hide{transform:translateY(calc(100% - 44px))}.btn{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);padding:9px 13px;border-radius:999px;cursor:pointer}.btn.active{color:var(--bg);background:var(--gold);border-color:var(--gold)}#toggle{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:22;width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(20,20,24,.88);cursor:pointer}#toggle:before{content:"";display:block;width:5px;height:5px;margin:auto;background:var(--ink);border-radius:50%;box-shadow:-9px 0 0 var(--ink),9px 0 0 var(--ink)}#meter{position:fixed;top:50%;right:18px;transform:translateY(-50%);z-index:10;width:1px;height:120px;background:rgba(255,255,255,.08)}#meter:after{content:"";position:absolute;bottom:0;left:-1px;width:3px;height:var(--lvl,0%);background:linear-gradient(to top,var(--gold),var(--cyan));transition:height .08s ease-out}.note{position:fixed;z-index:15;pointer-events:none;font-style:italic;color:var(--ink);text-shadow:0 0 24px rgba(217,196,163,.8),0 0 60px rgba(127,212,212,.3);animation:float 1.55s cubic-bezier(.16,.8,.4,1) forwards}@keyframes float{0%{opacity:0;transform:translate(-50%,-40%) scale(.6)}15%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-110%) scale(1.15)}}#flash{position:fixed;inset:0;z-index:5;pointer-events:none;background:rgba(255,255,255,0);transition:background .5s ease-out}@media(max-width:520px){.hud{font-size:9px}.title{font-size:18px}#panel{gap:7px}.btn{padding:8px 10px}}
</style>
</head>
<body>
<div id="stage"><video id="cam" class="mirror" autoplay playsinline muted></video><canvas id="fx" class="mirror"></canvas></div><div class="grade"></div><div id="flash"></div><div id="meter" style="--lvl:0%"></div>
<div class="hud tl"><div class="title">glass piano tiles<span class="sub">motion · refraction</span></div></div>
<div class="hud tr"><div class="row"><span>SCALE</span><span class="val" id="scaleLabel">PENTATONIC</span></div><div class="row"><span>FX</span><span class="val" id="fxLabel">HALL</span></div><div class="row"><span>MIRROR</span><span class="val" id="mirrorLabel">ON</span></div></div>
<div class="hud bl"><div class="row"><span>SHARDS</span><span class="val" id="shardCount">000</span></div><div class="row"><span>NOTES</span><span class="val" id="noteCount">000</span></div></div>
<div class="hud br"><div class="row"><span>REC</span><span class="val" id="time">00:00</span></div></div>
<button id="toggle" aria-label="toggle settings"></button>
<div id="panel"><button class="btn active" data-scale="pent">Pentatonic</button><button class="btn" data-scale="minor">Aeolian</button><button class="btn" data-scale="lydian">Lydian</button><button class="btn" data-scale="whole">Whole-tone</button><button class="btn active" id="mirrorBtn">Mirror</button></div>
<div id="gate"><div class="mark"></div><h1>動けば、<br><span class="em">音になる</span>。</h1><div class="tagline">tap · allow camera · move</div><div class="cta">enter</div></div>
<script>
const video=document.getElementById('cam'),canvas=document.getElementById('fx'),ctx=canvas.getContext('2d'),gate=document.getElementById('gate'),meter=document.getElementById('meter'),flash=document.getElementById('flash');
const small=document.createElement('canvas'),sw=48,sh=64;small.width=sw;small.height=sh;const sctx=small.getContext('2d',{willReadFrequently:true});
let audio,master,delay,feedback,droneGain,droneFilter,droneOscs=[],prev=null,mirrored=true,start=0,notes=0,totalMotion=0,smooth=0,lastFlash=0,lastNotes=[];
const scales={pent:[0,2,4,7,9],minor:[0,2,3,5,7,8,10],lydian:[0,2,4,6,7,9,11],whole:[0,2,4,6,8,10]},names=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];let scaleName='pent';
const shards=[],sparks=[];function fit(){const d=Math.min(devicePixelRatio||1,2);canvas.width=innerWidth*d;canvas.height=innerHeight*d;canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';ctx.setTransform(d,0,0,d,0,0)}addEventListener('resize',fit);
function freq(m){return 440*Math.pow(2,(m-69)/12)}function pick(intensity){const sc=scales[scaleName],deg=sc[Math.floor(Math.random()*sc.length)];return 60+deg+12*Math.floor(intensity*3)}
function initAudio(){if(audio)return;audio=new(window.AudioContext||window.webkitAudioContext)();master=audio.createGain();master.gain.value=.45;const comp=audio.createDynamicsCompressor();comp.threshold.value=-18;comp.ratio.value=4;master.connect(comp);comp.connect(audio.destination);delay=audio.createDelay(1.2);feedback=audio.createGain();feedback.gain.value=.34;const dg=audio.createGain();dg.gain.value=.22;delay.delayTime.value=.28;delay.connect(feedback);feedback.connect(delay);delay.connect(dg);dg.connect(master);droneFilter=audio.createBiquadFilter();droneFilter.type='lowpass';droneFilter.frequency.value=210;droneGain=audio.createGain();droneGain.gain.value=0;[0,7].forEach(c=>{const o=audio.createOscillator();o.type='triangle';o.frequency.value=freq(36)*Math.pow(2,c/1200);o.connect(droneFilter);o.start();droneOscs.push(o)});droneFilter.connect(droneGain);droneGain.connect(master)}
function play(m,vel,x){if(!audio)return;const t=audio.currentTime,f=freq(m),out=audio.createGain(),pan=audio.createStereoPanner?audio.createStereoPanner():null,filter=audio.createBiquadFilter();filter.type='lowpass';filter.frequency.value=1200+vel*8500;out.gain.value=1;if(pan){filter.connect(pan);pan.pan.value=(x*2-1)*.8;pan.connect(out)}else filter.connect(out);out.connect(master);out.connect(delay);[[1,1,2.5],[2.003,.38,1.2],[3.01,.18,.8],[4.2,.08,.45]].forEach(p=>{const o=audio.createOscillator(),g=audio.createGain();o.type='sine';o.frequency.value=f*p[0];g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vel*p[1]*.55,t+.005);g.gain.exponentialRampToValueAtTime(.0001,t+p[2]);o.connect(g);g.connect(filter);o.start(t);o.stop(t+p[2]+.06)});showNote(m,x*innerWidth,innerHeight*(.25+Math.random()*.5))}
function showNote(m,x,y){const el=document.createElement('div');el.className='note';el.textContent=names[m%12]+(Math.floor(m/12)-1);el.style.left=x+'px';el.style.top=y+'px';el.style.fontSize=24+Math.random()*18+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),1600)}
function spawn(x,y,intensity){for(let i=0;i<4+intensity*8;i++){const a=Math.random()*Math.PI*2,sp=1+Math.random()*(4+intensity*6),size=18+Math.random()*(42+intensity*42);shards.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-intensity*2,r:Math.random()*6,vr:(Math.random()-.5)*.18,size,life:1,decay:.012+Math.random()*.014,h:Math.random()*360})}while(shards.length>150)shards.shift();for(let i=0;i<8+intensity*12;i++){const a=Math.random()*Math.PI*2,sp=.5+Math.random()*(2+intensity*5);sparks.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,size:2+Math.random()*8,life:1,decay:.025+Math.random()*.035})}while(sparks.length>220)sparks.shift()}
function draw(){ctx.globalCompositeOperation='destination-out';ctx.fillStyle='rgba(0,0,0,.22)';ctx.fillRect(0,0,innerWidth,innerHeight);ctx.globalCompositeOperation='lighter';for(let i=shards.length-1;i>=0;i--){const s=shards[i];s.x+=s.vx;s.y+=s.vy;s.vy+=.15;s.vx*=.996;s.r+=s.vr;s.life-=s.decay;if(s.life<=0||s.y>innerHeight+100){shards.splice(i,1);continue}ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.r);ctx.globalAlpha=s.life;ctx.fillStyle='rgba(217,196,163,.13)';ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(0,-s.size*.55);ctx.lineTo(s.size*.5,s.size*.45);ctx.lineTo(-s.size*.55,s.size*.35);ctx.closePath();ctx.fill();ctx.stroke();ctx.strokeStyle='rgba(127,212,212,.28)';ctx.translate(-1,0);ctx.stroke();ctx.restore()}for(let i=sparks.length-1;i>=0;i--){const p=sparks[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.life-=p.decay;if(p.life<=0){sparks.splice(i,1);continue}ctx.globalAlpha=p.life;ctx.fillStyle='rgba(220,250,255,.9)';ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over'}
function detect(){if(video.readyState<2)return;sctx.save();if(mirrored){sctx.scale(-1,1);sctx.drawImage(video,-sw,0,sw,sh)}else sctx.drawImage(video,0,0,sw,sh);sctx.restore();const cur=sctx.getImageData(0,0,sw,sh).data;if(!prev){prev=new Uint8ClampedArray(cur);return}const cols=8,rows=12,cw=sw/cols,ch=sh/rows;let sum=0,trig=0;for(let cy=0;cy<rows;cy++)for(let cx=0;cx<cols;cx++){let diff=0,n=0;for(let y=Math.floor(cy*ch);y<Math.floor((cy+1)*ch);y+=2)for(let x=Math.floor(cx*cw);x<Math.floor((cx+1)*cw);x+=2){const k=(y*sw+x)*4;diff+=(Math.abs(cur[k]-prev[k])+Math.abs(cur[k+1]-prev[k+1])+Math.abs(cur[k+2]-prev[k+2]))/3;n++}const avg=diff/n;sum+=avg;if(avg>24&&trig<2){const sx=(cx+.5)/cols*innerWidth,sy=(cy+.5)/rows*innerHeight,intensity=Math.min(1,(avg-24)/65),now=performance.now();spawn(sx,sy,intensity);lastNotes=lastNotes.filter(t=>now-t<250);if(lastNotes.length<4){play(pick(intensity),.38+intensity*.55,sx/innerWidth);lastNotes.push(now);notes++;trig++}}}totalMotion=sum/(cols*rows);prev.set(cur);meter.style.setProperty('--lvl',Math.min(100,totalMotion*4)+'%')}
function tick(){detect();draw();smooth+=(totalMotion-smooth)*.05;if(audio){droneGain.gain.setTargetAtTime(Math.min(.055,smooth*.006),audio.currentTime,.3);droneFilter.frequency.setTargetAtTime(190+smooth*45,audio.currentTime,.4)}if(totalMotion>14&&performance.now()-lastFlash>650){flash.style.background='rgba(255,255,255,'+Math.min(.15,(totalMotion-14)/90)+')';lastFlash=performance.now();setTimeout(()=>flash.style.background='rgba(255,255,255,0)',60)}document.getElementById('shardCount').textContent=String(shards.length).padStart(3,'0');document.getElementById('noteCount').textContent=String(notes).padStart(3,'0');if(start){const e=(performance.now()-start)/1000;document.getElementById('time').textContent=String(Math.floor(e/60)).padStart(2,'0')+':'+String(Math.floor(e%60)).padStart(2,'0')}requestAnimationFrame(tick)}
async function camera(){const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}},audio:false});video.srcObject=stream;await new Promise(r=>video.onloadedmetadata=r);await video.play()}gate.addEventListener('click',async()=>{try{initAudio();await camera()}catch(e){alert('カメラの権限が必要です: '+e.message);return}fit();video.style.opacity='1';gate.classList.add('gone');start=performance.now();tick()},{once:true});
document.querySelectorAll('[data-scale]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-scale]').forEach(x=>x.classList.remove('active'));b.classList.add('active');scaleName=b.dataset.scale;document.getElementById('scaleLabel').textContent=b.textContent.toUpperCase()});document.getElementById('mirrorBtn').onclick=()=>{mirrored=!mirrored;video.classList.toggle('mirror',mirrored);canvas.classList.toggle('mirror',mirrored);document.getElementById('mirrorBtn').classList.toggle('active',mirrored);document.getElementById('mirrorLabel').textContent=mirrored?'ON':'OFF';prev=null};document.getElementById('toggle').onclick=()=>document.getElementById('panel').classList.toggle('hide');
</script>
</body>
</html>
